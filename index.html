<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>REDUEL</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.30.0/dist/tabler-icons.min.css">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root{--bg:#0B0F1A;--panel:#141B2D;--panel2:#1A2338;--line:#222D47;--mut:#8A93A6;--txt:#EDF1F7;--gold:#FFC94D;--goldD:#412402;--y:#2FE0C8;--yD:#04342C;--yBg:#0F3B36;--o:#F45E93;--oD:#4B1528;--oBg:#421A2C}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:#07090F}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;color:var(--txt)}
#app{max-width:420px;margin:0 auto;min-height:100vh;background:var(--bg);position:relative;padding-bottom:66px}
#top{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;position:sticky;top:0;background:var(--bg);z-index:5;border-bottom:1px solid var(--line)}
#top .logo{font-size:17px;font-weight:800;letter-spacing:1px}
#top .logo span{color:var(--y)}
.icoBtn{background:none;border:none;color:var(--mut);font-size:19px;padding:4px 6px;cursor:pointer}
#topBal{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:6px 12px;font-size:13px;color:var(--gold);font-weight:600;cursor:pointer}
.scr{display:none;padding:16px 14px 20px}
.scr.on{display:block}
#nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:420px;display:flex;background:#0E1424;border-top:1px solid var(--line);z-index:8;align-items:stretch}
#nav button{flex:1;background:none;border:none;color:var(--mut);padding:12px 0;cursor:pointer;font-size:22px}
#nav button.on{color:var(--y)}
#nav .navc{font-size:15px;font-weight:800;letter-spacing:1.5px;color:var(--txt)}
#nav .navc.on{color:var(--gold)}
.card{background:var(--panel);border-radius:14px;padding:14px;margin-bottom:12px}
.btn{display:block;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:600;cursor:pointer;text-align:center;width:100%}
.btn-y{background:var(--y);color:var(--yD)}
.btn-o{background:var(--o);color:var(--oD)}
.btn-gold{background:var(--gold);color:var(--goldD)}
.btn-dim{background:var(--panel2);color:var(--txt)}
.chip{background:var(--panel2);color:var(--txt);border:1px solid var(--panel2);padding:7px 12px;border-radius:9px;font-size:13px;cursor:pointer}
.chip.sel{border-color:var(--gold);color:var(--gold);font-weight:600}
.mut{color:var(--mut)}
.sec{font-size:12px;color:var(--mut);margin:14px 2px 6px}
input,select{background:var(--panel2);border:1px solid var(--line);border-radius:10px;color:var(--txt);padding:11px 12px;font-size:14px;width:100%;outline:none}
input:focus{border-color:var(--y)}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
input[type=number]{-moz-appearance:textfield;appearance:textfield}
.row{display:flex;gap:8px;align-items:center}
.spread{display:flex;justify-content:space-between;align-items:center}
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700}
.listrow{display:flex;justify-content:space-between;align-items:center;background:var(--panel);border-radius:11px;padding:10px 12px;font-size:13px;margin-bottom:6px;gap:8px}
.badge{font-size:10px;padding:2px 7px;border-radius:8px;background:var(--panel2);color:var(--mut)}
.stat{flex:1;background:var(--panel);border-radius:11px;padding:10px;text-align:center}
.stat b{font-size:17px;font-weight:600;color:var(--gold);display:block}
.stat span{font-size:10px;color:var(--mut)}
.swatch{width:42px;height:26px;border-radius:9px;border:2px solid transparent;padding:0;overflow:hidden;display:flex;cursor:pointer}
.swatch.sel{border-color:var(--txt)}
.swatch span{flex:1}
#toast{position:fixed;bottom:78px;left:50%;transform:translateX(-50%);background:var(--panel2);color:var(--txt);border:1px solid var(--line);padding:10px 18px;border-radius:12px;font-size:13px;z-index:20;display:none;max-width:90%;text-align:center}
.spin{width:36px;height:36px;border:3px solid var(--line);border-top-color:var(--y);border-radius:50%;margin:0 auto;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.fd{font-size:12px;color:var(--mut);text-align:center;min-height:26px;overflow:hidden;transition:opacity .25s;margin-top:8px;display:flex;align-items:center;justify-content:center;gap:6px}
.fd .fb,.listrow .fb{background:var(--panel2);border:1px solid var(--line);color:var(--txt);border-radius:7px;padding:2px 7px;font-size:11px;cursor:pointer}
.hash{font-family:ui-monospace,Menlo,monospace;font-size:10px;color:var(--mut);word-break:break-all}
.em{background:var(--panel2);border:1px solid var(--line);color:var(--gold);border-radius:10px;padding:8px 14px;font-size:18px;cursor:pointer}
.emfx{position:absolute;font-size:54px;color:var(--gold);display:none;z-index:3;animation:pop .9s ease}
@keyframes pop{0%{transform:scale(.3);opacity:0}25%{transform:scale(1.2);opacity:1}80%{opacity:1}100%{transform:scale(1);opacity:0}}
.dv{flex:1;text-align:center;font-size:10px;padding:6px 2px;border-radius:8px;background:var(--panel);color:var(--mut);border:1px solid transparent;cursor:pointer}
.dv.mine{border-color:var(--y)}
.dv.sel{background:var(--gold);color:var(--goldD);font-weight:700}
</style>
</head>
<body>
<div id="app">

<div id="top" style="display:none">
  <div class="logo">RE<span>DUEL</span></div>
  <div class="row" style="gap:2px">
    <button id="sndBtn" class="icoBtn" aria-label="sound"><i id="sndIco" class="ti ti-volume"></i></button>
    <button id="profBtn" class="icoBtn" aria-label="profile"><i class="ti ti-user"></i></button>
    <div id="topBal">$0.00</div>
  </div>
</div>

<div id="s-reg" class="scr">
  <div style="text-align:center;padding:40px 10px 20px">
    <div style="font-size:34px;font-weight:800;letter-spacing:2px">RE<span style="color:var(--y)">DUEL</span></div>
    <div class="mut" style="font-size:14px;margin-top:8px;line-height:1.5" data-i="reg_tag"></div>
  </div>
  <div class="card">
    <div class="sec" style="margin-top:0" data-i="reg_lang"></div>
    <div class="row" id="regLangs">
      <button class="chip lng sel" data-l="ru">Рус</button>
      <button class="chip lng" data-l="uk">Укр</button>
      <button class="chip lng" data-l="en">Eng</button>
    </div>
    <div class="sec" data-i="reg_nick"></div>
    <input id="regNick" maxlength="14" placeholder="kolya_w" autocomplete="off">
    <div class="mut" style="font-size:10px;margin-top:4px" data-i="reg_nick_hint"></div>
    <div class="sec" data-i="reg_color"></div>
    <div class="row" id="regThemes">
      <button class="swatch sel" data-th="0"><span style="background:#2FE0C8"></span><span style="background:#F45E93"></span></button>
      <button class="swatch" data-th="1"><span style="background:#9587FA"></span><span style="background:#FFA226"></span></button>
      <button class="swatch" data-th="2"><span style="background:#5CE68A"></span><span style="background:#5FA8FF"></span></button>
    </div>
    <div style="margin-top:16px"><button class="btn btn-y" id="regGo" data-i="reg_go"></button></div>
  </div>
  <div class="mut" style="font-size:11px;text-align:center;line-height:1.6;padding:0 14px" data-i="reg_disc"></div>
</div>

<div id="s-lobby" class="scr">
  <div class="card">
    <div class="spread">
      <div>
        <div class="mut" style="font-size:11px"><span data-i="balance"></span> · <span data-i="demo"></span></div>
        <div id="lobBal" style="font-size:28px;font-weight:800;color:var(--gold)">$0.00</div>
      </div>
      <i class="ti ti-wallet" style="font-size:30px;color:var(--mut)"></i>
    </div>
    <div class="row" style="margin-top:12px">
      <button class="btn btn-y" id="goDep" style="flex:1;padding:12px;font-size:14px"><i class="ti ti-plus"></i> <span data-i="dep"></span></button>
      <button class="btn btn-dim" id="goWd" style="flex:1;padding:12px;font-size:14px;border:1px solid var(--line)"><i class="ti ti-arrow-up-right"></i> <span data-i="wd"></span></button>
    </div>
  </div>
  <button class="btn btn-y" id="goFight" style="font-size:17px;padding:16px"><i class="ti ti-swords"></i> <span data-i="fight"></span></button>
  <div class="row" style="margin-top:10px">
    <button class="btn btn-dim" id="goInv" style="font-size:13px;padding:11px"><i class="ti ti-user-plus"></i> <span data-i="call_friend"></span></button>
    <button class="btn btn-dim" id="goRate2" style="font-size:13px;padding:11px"><i class="ti ti-trophy"></i> <span data-i="top_week"></span></button>
  </div>
  <div class="sec" data-i="live"></div>
  <div id="liveList"></div>
  <div class="sec" data-i="records"></div>
  <div class="row">
    <div class="stat"><b>14</b><span><span data-i="streak_w"></span> · LUNA</span></div>
    <div class="stat"><b>$480</b><span><span data-i="bigwin_w"></span> · MURA</span></div>
    <div class="stat"><b id="onlineN" style="color:var(--y)">1 247</b><span data-i="online"></span></div>
  </div>
  <div class="sec" data-i="skills"></div>
  <div class="listrow"><span><i class="ti ti-shield-check" style="color:var(--y)"></i> <span data-i="sk_sh_n"></span> <span class="mut" style="font-size:11px" data-i="sk_sh_d"></span></span><button class="chip" id="buySh">$3 · <span id="ownSh">0</span></button></div>
  <div class="listrow"><span><i class="ti ti-sparkles" style="color:var(--gold)"></i> <span data-i="sk_gold_n"></span> <span class="mut" style="font-size:11px" data-i="sk_skin_d"></span></span><button class="chip" id="buyGold">$2</button></div>
  <div class="listrow"><span><i class="ti ti-ghost" style="color:#fff"></i> <span data-i="sk_neon_n"></span> <span class="mut" style="font-size:11px" data-i="sk_skin_d"></span></span><button class="chip" id="buyNeon">$2</button></div>
  <div class="listrow"><span><i class="ti ti-mood-tongue" style="color:var(--o)"></i> <span data-i="sk_emo_n"></span> <span class="mut" style="font-size:11px" data-i="sk_emo_d"></span></span><button class="chip" id="buyEmo">$2</button></div>
  <div id="feed" class="fd"></div>
</div>

<div id="s-duel" class="scr">
<div id="dGame">
  <div class="spread" style="margin-bottom:8px;min-height:54px">
    <div class="row">
      <div id="dMyAv" class="av" style="width:44px;height:44px;background:var(--yBg);border:2px solid var(--y);color:var(--y);font-size:12px;transition:transform .3s,opacity .3s">—</div>
      <div>
        <div id="dMyNick" style="font-size:13px;font-weight:600">—</div>
        <div id="dMySub" class="mut" style="font-size:11px">—</div>
      </div>
    </div>
    <div style="text-align:center">
      <div id="dLead" class="badge" data-i="bank"></div>
      <div id="dBank" style="font-size:19px;font-weight:700;color:var(--gold)">—</div>
    </div>
    <div class="row">
      <div style="text-align:right">
        <div id="dOpNick" style="font-size:13px;font-weight:600">—</div>
        <div id="dOpSub" style="font-size:11px;color:var(--o)">—</div>
      </div>
      <div id="dOpAv" class="av" style="width:44px;height:44px;background:var(--oBg);border:2px solid var(--o);color:var(--o);font-size:12px;transition:transform .3s,opacity .3s">?</div>
    </div>
  </div>

  <div id="dWrap" style="position:relative;border-radius:14px;overflow:hidden;border:2px solid var(--line)">
    <canvas id="dArena" width="360" height="420" style="display:block;width:100%;height:auto;background:#090D16"></canvas>
    <div id="dClutch" style="position:absolute;top:8px;left:50%;transform:translateX(-50%);background:var(--gold);color:var(--goldD);font-size:11px;font-weight:700;padding:3px 10px;border-radius:10px;display:none">CLUTCH TIME</div>
    <i id="emoMe" class="emfx ti" style="left:14px;bottom:14px"></i>
    <i id="emoOp" class="emfx ti" style="right:14px;top:14px"></i>
    <div id="dOv" style="position:absolute;inset:0;background:rgba(9,13,22,.93);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:9px;text-align:center;padding:0 16px;overflow-y:auto">

      <div id="dSetup" style="display:flex;flex-direction:column;gap:9px;align-items:center;width:100%">
        <div style="font-size:18px;font-weight:700" data-i="duel"></div>
        <div class="mut" style="font-size:12px" data-i="duel_sub"></div>
        <div class="row">
          <button class="chip zb" data-b="1">$1</button>
          <button class="chip zb sel" data-b="5">$5</button>
          <button class="chip zb" data-b="10">$10</button>
          <button class="chip zb" data-b="25">$25</button>
          <input id="dCust" type="number" min="1" style="width:62px;padding:7px 8px;font-size:13px">
        </div>
        <div class="row">
          <span class="mut" style="font-size:11px" data-i="line_lbl"></span>
          <button class="chip zv" data-v="0.7" data-i="l_calm"></button>
          <button class="chip zv sel" data-v="1" data-i="l_classic"></button>
          <button class="chip zv" data-v="1.4" data-i="l_wild"></button>
        </div>
        <div class="row" id="skillRow" style="flex-wrap:wrap;justify-content:center"></div>
        <button class="btn btn-y" id="dFind" style="max-width:280px;margin-top:2px"><i class="ti ti-search"></i> <span data-i="find_opp"></span></button>
      </div>

      <div id="dSearch" style="display:none;flex-direction:column;gap:12px;align-items:center">
        <div class="spin"></div>
        <div style="font-size:14px" data-i="search"></div>
        <div class="mut" style="font-size:11px"><span id="dsBet">$5</span> · 24s</div>
      </div>

      <div id="dFound" style="display:none;flex-direction:column;gap:10px;align-items:center">
        <div class="mut" style="font-size:12px" data-i="found"></div>
        <div class="row">
          <div id="fOpAv" class="av" style="width:52px;height:52px;background:var(--oBg);border:2px solid var(--o);color:var(--o);font-size:14px">?</div>
          <div style="text-align:left">
            <div id="fOpNick" style="font-size:16px;font-weight:700">—</div>
            <div id="fOpSub" class="mut" style="font-size:11px">—</div>
          </div>
        </div>
        <div id="fTend" style="font-size:12px;color:var(--gold)">—</div>
        <div class="mut" style="font-size:11px"><span data-i="blind_t"></span> <b id="fTimer" style="color:var(--gold);font-size:14px">10</b></div>
        <div class="row" style="margin-top:2px">
          <button class="btn btn-y" id="dUp" style="width:auto;padding:11px 22px"><i class="ti ti-arrow-up"></i> <span data-i="up"></span></button>
          <button class="btn btn-o" id="dDown" style="width:auto;padding:11px 22px"><i class="ti ti-arrow-down"></i> <span data-i="down"></span></button>
        </div>
        <div id="fReveal" style="display:none;font-size:14px;font-weight:600;color:var(--gold)">—</div>
        <div id="fFair" class="hash" style="max-width:280px">—</div>
        <button id="fCh" class="chip" style="font-size:11px;padding:5px 10px"><i class="ti ti-refresh"></i> <span data-i="change_opp"></span></button>
      </div>

    </div>
  </div>
  <div class="row" style="margin-top:10px">
    <div style="flex:1;height:6px;background:var(--panel2);border-radius:3px;overflow:hidden"><div id="dTbar" style="height:100%;width:100%;background:var(--y);border-radius:3px"></div></div>
    <div id="dTnum" style="font-size:14px;font-weight:600;min-width:34px;text-align:right" class="mut">0:24</div>
  </div>
  <div id="emoBar" class="row" style="display:none;justify-content:center;margin-top:8px">
    <button class="em" data-e="ti-flame"><i class="ti ti-flame"></i></button>
    <button class="em" data-e="ti-skull"><i class="ti ti-skull"></i></button>
    <button class="em" data-e="ti-mood-tongue"><i class="ti ti-mood-tongue"></i></button>
    <button class="em" data-e="ti-bolt"><i class="ti ti-bolt"></i></button>
  </div>
</div>

<div id="dResF" style="display:none;flex-direction:column;align-items:center;gap:14px;min-height:calc(100vh - 220px);justify-content:center;text-align:center">
  <div id="rTitle" style="font-size:28px;font-weight:800">—</div>
  <div id="rSub" class="mut" style="font-size:14px;line-height:1.6;max-width:320px">—</div>
  <canvas id="rCard" width="340" height="170" style="width:min(340px,88vw);height:auto;border-radius:12px;border:1px solid var(--line)"></canvas>
  <button class="btn btn-gold" id="rRe" style="font-size:19px;padding:17px;max-width:340px"><i class="ti ti-swords"></i> REDUEL</button>
  <div class="row" style="width:100%;max-width:340px">
    <button class="btn btn-dim" id="rCh" style="flex:1;padding:13px;font-size:13px"><i class="ti ti-adjustments"></i> <span data-i="re_change"></span></button>
    <button class="btn btn-dim" id="rShare" style="flex:1;padding:13px;font-size:13px"><i class="ti ti-share"></i> <span data-i="re_share"></span></button>
  </div>
  <button id="rNew" style="background:none;border:none;color:var(--mut);font-size:13px;text-decoration:underline;cursor:pointer" data-i="re_new"></button>
  <div id="rFair" class="hash" style="max-width:320px"></div>
</div>
<div id="feed2" class="fd"></div>
</div>

<div id="s-rate" class="scr">
  <div class="card">
    <div class="spread" style="margin-bottom:8px">
      <div class="row">
        <i class="ti ti-shield" style="font-size:28px;color:var(--gold)"></i>
        <div>
          <div id="myDiv" style="font-size:15px;font-weight:700">—</div>
          <div id="myEloLine" class="mut" style="font-size:11px">—</div>
        </div>
      </div>
      <div id="myProgTxt" style="font-size:11px;color:var(--y)">—</div>
    </div>
    <div style="height:6px;background:var(--panel2);border-radius:3px"><div id="myProg" style="height:100%;width:0%;background:var(--gold);border-radius:3px"></div></div>
  </div>
  <div class="row" id="divLadder" style="gap:4px"></div>
  <div class="mut" style="font-size:10px;text-align:center;margin-top:6px" data-i="dv_hint"></div>
  <div class="sec" data-i="top_week"></div>
  <div id="topList"></div>
</div>

<div id="s-invite" class="scr">
  <div class="card" style="text-align:center">
    <i class="ti ti-user-plus" style="font-size:34px;color:var(--y)"></i>
    <div style="font-size:17px;font-weight:700;margin:8px 0 4px" data-i="inv_t"></div>
    <div class="mut" style="font-size:12px;line-height:1.6" data-i="inv_d"></div>
  </div>
  <div class="sec" data-i="your_link"></div>
  <div class="card row">
    <div id="refLink" style="flex:1;font-size:12px;color:var(--y);word-break:break-all">—</div>
    <button class="chip" id="refCopy"><i class="ti ti-copy"></i></button>
  </div>
  <button class="btn btn-gold" id="invChal"><i class="ti ti-swords"></i> <span data-i="inv_chal"></span></button>
  <div class="mut" style="font-size:11px;text-align:center;margin-top:8px" data-i="inv_chal_d"></div>
  <div class="sec" data-i="your_friends"></div>
  <div id="invList"></div>
</div>

<div id="s-prof" class="scr">
  <div class="card row">
    <div id="pAv" class="av" style="width:54px;height:54px;background:var(--yBg);border:2px solid var(--y);color:var(--y);font-size:16px">—</div>
    <div style="flex:1">
      <div id="pNick" style="font-size:16px;font-weight:700">—</div>
      <div id="pDiv" class="mut" style="font-size:12px">—</div>
    </div>
    <div style="text-align:right">
      <div id="pStreak" style="font-size:14px;font-weight:600;color:var(--gold)">—</div>
      <div class="mut" style="font-size:10px" data-i="cur_streak"></div>
    </div>
  </div>
  <div class="row">
    <div class="stat"><b id="stG">0</b><span data-i="duels_w"></span></div>
    <div class="stat"><b id="stF">0</b><span data-i="friends_w"></span></div>
    <div class="stat"><b id="stR">0</b><span data-i="rec_streak"></span></div>
    <div class="stat"><b id="stB">$0</b><span data-i="best_win"></span></div>
  </div>
  <div class="sec" data-i="history"></div>
  <div id="histList"></div>
  <div class="sec" data-i="settings"></div>
  <div class="card">
    <div class="spread" style="margin-bottom:10px">
      <span style="font-size:13px" data-i="lang_lbl"></span>
      <div class="row" id="profLangs">
        <button class="chip lng" data-l="ru">Рус</button>
        <button class="chip lng" data-l="uk">Укр</button>
        <button class="chip lng" data-l="en">Eng</button>
      </div>

  var meUp=D.pick===1;

  var pts=Math.floor(shown)+1;

  cx.lineTo(lastX,H);cx.lineTo(0,H);cx.closePath();cx.fillStyle=hexA(cBot,aBot);cx.fill();
  cx.beginPath();cx.moveTo(0,MID-D.vals[0]);for(i=1;i<pts;i++)cx.lineTo(i*dx,MID-D.vals[i]);cx.lineTo(lastX,lastY);
  cx.lineTo(lastX,0);cx.lineTo(0,0);cx.closePath();cx.fillStyle=hexA(cTop,aTop);cx.fill();
  cx.strokeStyle='#39466B';cx.setLineDash([5,5]);cx.beginPath();cx.moveTo(0,MID);cx.lineTo(W,MID);cx.stroke();cx.setLineDash([]);
  cx.strokeStyle='rgba(255,201,77,.4)';cx.beginPath();cx.moveTo(W-1,0);cx.lineTo(W-1,H);cx.stroke();
  var sk=skinStyle(lead?S.skin:D.oppSkin,inCl?GOLD:'#F2F5FA');
  cx.beginPath();cx.moveTo(0,MID-D.vals[0]);for(i=1;i<pts;i++)cx.lineTo(i*dx,MID-D.vals[i]);cx.lineTo(lastX,lastY);
  cx.strokeStyle=inCl&&sk.line==='#F2F5FA'?GOLD:sk.line;cx.lineWidth=sk.w;cx.stroke();cx.lineWidth=1;
  for(i=D.rings.length-1;i>=0;i--){var rg=D.rings[i];rg.r+=4.5;rg.a-=0.045;
    if(rg.a<=0){D.rings.splice(i,1);continue}
    cx.beginPath();cx.arc(rg.x,rg.y,rg.r,0,7);cx.strokeStyle=hexA(rg.c,rg.a);cx.lineWidth=2;cx.stroke();cx.lineWidth=1}
  for(i=D.parts.length-1;i>=0;i--){var p=D.parts[i];p.x+=p.vx;p.y+=p.vy;p.l-=0.035;
    if(p.l<=0){D.parts.splice(i,1);continue}

  if(D.flash>0){cx.fillStyle=hexA(D.flashC,D.flash*0.14);cx.fillRect(0,0,W,H);D.flash-=0.07}
  var pr=5+Math.sin(el/120)*1.5;
  cx.beginPath();cx.arc(lastX,lastY,pr,0,7);cx.fillStyle=sk.dot||(curV>=0?cBot:cTop);cx.fill();
  cx.strokeStyle='#F2F5FA';cx.stroke();
  $('dMyAv').style.transform=lead?'scale(1.22)':'scale(.9)';$('dMyAv').style.opacity=lead?'1':'.55';
  $('dOpAv').style.transform=lead?'scale(.9)':'scale(1.22)';$('dOpAv').style.opacity=lead?'.55':'1';
